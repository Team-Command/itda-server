spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

cors:
  allowed-origins:
    local: http://localhost:8080
    dev: ${DEV_URL}
    main: ${MAIN_URL}

redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}

app:
  cookie:
    secure: false # 테스트 환경에선 false, 운영 환경에선 https를 사용함, 따라서 true로 바꾼뒤 운영해야함

session:
  expiration: 1800
